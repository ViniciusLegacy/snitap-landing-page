<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snitap Patins</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>
    <header class="top">
        <a href="#">
            <img src="assets/icons/logo.svg" alt="logomarca">
        </a>
        <a href="#">
            <img src="assets/icons/shopping-bag-01.svg" alt="ícone de sacola de shopping">
            <span>1</span>
        </a>
    </header>

    <section class="hero">
        <div>
            <h1>
                Snitap, sua vida mais
                <div>
                    <span>radical</span>
                    <span>divertida</span>
                    <span>saudável</span>
                    <span>radical</span>
                </div>
            </h1>

            <div class="buttons">
                <a href="#" class="button buy shadow">
                    <img src="assets/icons/shopping-bag-01.svg" alt="ícone de sacalo de compras">
                    COMPRAR AGORA
                </a>

                <a href="#" class="button play">
                    <span class="shadow">
                        <img src="assets/icons/play.svg" alt="ícone de um botão de play">
                    </span>
                    VEJA EM AÇÃO
                </a>
            </div>
        </div>

        <div>
            <div class="content">
                <img src="assets/icons/Ellipse.svg" alt="elipse azul">
                <img src="assets/images/patins-image.png" alt="patins branco">
                <img src="assets/icons/Stars 1.svg" alt="estrelas pretas">
                <img src="assets/icons/Stars 2.svg" alt="estrelas pretas">
            </div>
        </div>
    </section>

    <section class="banner">
        <div class="scroller bg-gradient-animated">
            <div class="rolling">
                <img src="assets/banner.svg" alt="">
                <img src="assets/banner.svg" alt="">
                <img src="assets/banner.svg" alt="">
                <img src="assets/banner.svg" alt="">
                <img src="assets/banner.svg" alt="">
                <img src="assets/banner.svg" alt="">
                <img src="assets/banner.svg" alt="">
                <img src="assets/banner.svg" alt="">
                <img src="assets/banner.svg" alt="">
                <img src="assets/banner.svg" alt="">
                <img src="assets/banner.svg" alt="">
                <img src="assets/banner.svg" alt="">
                <img src="assets/banner.svg" alt="">
                <img src="assets/banner.svg" alt="">
                <img src="assets/banner.svg" alt="">
                <img src="assets/banner.svg" alt="">
            </div>
        </div>
    </section>

    <section class="gallery">
        <header>
            <span>GALERIA DE FOTOS</span>
            <h2>#usesnitap por aí</h2>
        </header>

        <div class="content">
            <figure>
                <img src="assets/images/image 01.png" alt="mulher andando de patins content">
                <figcaption>
                    <img src="assets/images/person.png" alt="foto de perfil">
                    <span>@laviniapereira</span>
                </figcaption>
            </figure>

            <figure data-delay>
                <img src="assets/images/image 02.png" alt="mulher andando de patins content">
                <figcaption>
                    <img src="assets/images/person.png" alt="foto de perfil">
                    <span>@laviniapereira</span>
                </figcaption>
            </figure>

            <figure>
                <img src="assets/images/image 03.png" alt="mulher andando de patins content">
                <figcaption>
                    <img src="assets/images/person.png" alt="foto de perfil">
                    <span>@laviniapereira</span>
                </figcaption>
            </figure>

            <figure data-delay>
                <img src="assets/images/image 04.png" alt="mulher andando de patins content">
                <figcaption>
                    <img src="assets/images/person.png" alt="foto de perfil">
                    <span>@laviniapereira</span>
                </figcaption>
            </figure>
        </div>
    </section>

    <footer>
        <div class="logo">
            <img src="assets/icons/logo.svg" alt="logomarca">
            Snitap
        </div>

        <nav>
            <a href="#">Sobre</a>
            <a href="#">Nossas lojas</a>
            <a href="#">Política de privacidade</a>
        </nav>

        <div class="social-links">
            <a href="#" title="instagram">
                <img src="assets/icons/mdi_instagram.svg" alt="logomarca do instagram">
            </a>
            <a href="#" title="facebook">
                <img src="assets/icons/ic_baseline-facebook.svg" alt="logomarca do facebook">
            </a>
            <a href="#" title="youtube">
                <img src="assets/icons/mdi_youtube.svg" alt="logomarca do youtube">
            </a>
            <a href="#" title="tiktok">
                <img src="assets/icons/ic_baseline-tiktok.svg" alt="logomarca do tiktok">
            </a>
        </div>
    </footer>
</body>
</html>
